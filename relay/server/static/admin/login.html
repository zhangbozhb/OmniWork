<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OmniWork Relay Admin Login</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b1117; color: #dbe7f3; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top left, rgba(39, 92, 246, 0.22), transparent 32rem), #0b1117; }
    main { width: min(100%, 440px); padding: 28px; border: 1px solid rgba(79, 103, 130, 0.3); border-radius: 22px; background: rgba(13, 22, 32, 0.9); box-shadow: 0 24px 70px rgba(0,0,0,.34); }
    h1 { margin: 0; font-size: 24px; letter-spacing: -0.04em; }
    p { margin: 10px 0 22px; color: #8ea2b7; line-height: 1.6; }
    label { display: grid; gap: 8px; color: #9fb3c8; font-size: 13px; font-weight: 700; }
    input { width: 100%; border: 1px solid #263548; border-radius: 12px; background: #101a25; color: #dbe7f3; padding: 12px; font: inherit; }
    button { width: 100%; margin-top: 14px; border: 0; border-radius: 12px; background: linear-gradient(180deg, #2459e8, #1a43b7); color: #fff; cursor: pointer; font: inherit; font-weight: 800; padding: 12px; }
    .error { min-height: 20px; margin-top: 12px; color: #fca5a5; }
    code { color: #bfdbfe; }
  </style>
</head>
<body>
  <main>
    <h1>Relay Admin Login</h1>
    <p>Enter the current one-time token from <code>admin-token.json</code>. The token is consumed after a successful login.</p>
    <form id="login-form">
      <label>One-time token
        <input id="token" autocomplete="one-time-code" minlength="64" maxlength="64" required />
      </label>
      <button type="submit">Continue</button>
      <div class="error" id="error"></div>
    </form>
  </main>
  <script>
    const form = document.getElementById("login-form");
    const token = document.getElementById("token");
    const error = document.getElementById("error");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      const res = await fetch("/admin/api/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ token: token.value.trim() }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        error.textContent = body.error || "Login failed";
        return;
      }
      location.href = "/admin/web";
    });
  </script>
</body>
</html>
