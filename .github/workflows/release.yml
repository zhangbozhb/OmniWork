name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark this GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean
      app_store_url:
        description: "iOS App Store URL shown on the download page"
        required: false
        default: "https://apps.apple.com/app/<app-id>"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release Assets
    runs-on: ubuntu-latest
    env:
      OMNIWORK_RELEASE_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            prerelease="${{ inputs.prerelease }}"
            app_store_url="${{ inputs.app_store_url }}"
          else
            version="${GITHUB_REF_NAME}"
            prerelease="false"
            app_store_url="https://apps.apple.com/app/<app-id>"
          fi

          if [[ "${version}" != v* ]]; then
            version="v${version}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "released_at=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "app_store_url=${app_store_url}" >> "$GITHUB_OUTPUT"
          echo "app_version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Android signing key
        env:
          OMNIWORK_RELEASE_KEYSTORE_BASE64: ${{ secrets.OMNIWORK_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$OMNIWORK_RELEASE_KEYSTORE_BASE64" ]]; then
            echo "No Android release keystore configured; Gradle will use debug signing fallback."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/omniwork-signing"
          echo "$OMNIWORK_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/omniwork-signing/release.keystore"

      - name: Build Android APK
        env:
          OMNIWORK_APP_VERSION: ${{ steps.meta.outputs.app_version }}
          OMNIWORK_RELEASE_KEYSTORE: ${{ runner.temp }}/omniwork-signing/release.keystore
          OMNIWORK_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.OMNIWORK_RELEASE_KEYSTORE_PASSWORD }}
          OMNIWORK_RELEASE_KEY_ALIAS: ${{ secrets.OMNIWORK_RELEASE_KEY_ALIAS }}
          OMNIWORK_RELEASE_KEY_PASSWORD: ${{ secrets.OMNIWORK_RELEASE_KEY_PASSWORD }}
        run: pnpm app:build:android:apk

      - name: Prepare Release assets
        shell: bash
        run: |
          mkdir -p dist/release
          cp app/android/app/build/outputs/apk/release/app-release.apk \
            "dist/release/omniwork-android-${{ steps.meta.outputs.version }}.apk"

      - name: Package Desktop Agent
        run: |
          pnpm release:desktop-agent -- \
            --version "${{ steps.meta.outputs.version }}" \
            --out-dir dist/release \
            --platform linux-x64

      - name: Update download manifest and checksums
        run: |
          pnpm release:downloads -- \
            --version "${{ steps.meta.outputs.version }}" \
            --released-at "${{ steps.meta.outputs.released_at }}" \
            --repo "${{ github.repository }}" \
            --assets-dir dist/release \
            --desktop-platform linux-x64 \
            --app-store-url "${{ steps.meta.outputs.app_store_url }}"

      - name: Restore workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify site build
        run: pnpm site:build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          flags=()
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            flags+=(--prerelease)
          fi

          gh release create "${{ steps.meta.outputs.version }}" \
            dist/release/* \
            --title "OmniWork ${{ steps.meta.outputs.version }}" \
            --notes "Release assets for OmniWork ${{ steps.meta.outputs.version }}." \
            "${flags[@]}"

      - name: Upload updated downloads manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloads-manifest-${{ steps.meta.outputs.version }}
          path: site/public/downloads.json
