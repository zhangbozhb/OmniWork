<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#101417" />
    <title>OmniWork</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        min-height: 100%;
        width: 100%;
      }

      body {
        background: #101417;
        overflow: hidden;
      }

      #root {
        display: flex;
        min-height: 100vh;
      }

      @supports (height: 100dvh) {
        html,
        body,
        #root {
          height: 100dvh;
          min-height: 100dvh;
        }

        #root {
          min-height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <noscript>OmniWork requires JavaScript to run.</noscript>
    <div id="root"></div>
    <script>
      window.__OMNIWORK_APP_CONFIG__ = Object.assign(
        {},
        window.__OMNIWORK_APP_CONFIG__ || {},
        { defaultRelayUrl: "<%= omniworkDefaultRelayUrl %>" },
      );
    </script>
  </body>
</html>
